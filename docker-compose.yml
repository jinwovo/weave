name: weave

# Infrastructure only — the app runs on the host (./gradlew :app:bootRun, port 8103) and connects
# to these, matching the other workspace projects. The app's containerised form lives in Dockerfile.
services:
  postgres:
    image: postgres:16-alpine
    container_name: weave-postgres
    environment:
      POSTGRES_DB: weave
      POSTGRES_USER: weave
      POSTGRES_PASSWORD: weave
    ports:
      - "5437:5432"          # host 5437 (registry-allocated) -> container 5432
    volumes:
      - weave-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weave -d weave"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: weave-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6383:6379"          # host 6383 (registry-allocated) -> container 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- observability (scrapes the host app on :8103; dashboard provisioned, anonymous read) ---
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: weave-prometheus
    ports:
      - "9099:9090"          # host 9099 (registry-allocated; 9098 is raft's) -> container 9090
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: weave-grafana
    ports:
      - "3011:3000"          # host 3011 (registry-allocated; 3008 is raft's) -> container 3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  weave-pgdata:

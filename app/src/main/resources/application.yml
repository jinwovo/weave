server:
  port: 8103

spring:
  application:
    name: weave
  datasource:
    url: jdbc:postgresql://localhost:5437/weave
    username: weave
    password: weave
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6383

# Snapshot-accelerated replay: the sweeper folds any room whose un-snapshotted op-log tail
# passed `threshold` into canvas_snapshot, so a cold start replays O(tail) instead of O(log).
# `grace` keeps the watermark behind rows young enough that their transaction might still be
# in flight (see SnapshotStore).
weave:
  snapshot:
    threshold: 500
    grace: PT10S
    sweep-delay: PT30S

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: weave
    distribution:
      # publish histogram buckets so Grafana can compute p95/p99 with histogram_quantile
      percentiles-histogram:
        http.server.requests: true
        weave.ingest: true

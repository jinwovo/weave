name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: crdt-core + app (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      # `build` runs the jqwik convergence proofs and the app integration test, which spins up
      # PostgreSQL + Redis via Testcontainers against the runner's preinstalled Docker.
      - run: ./gradlew build --no-daemon

  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
